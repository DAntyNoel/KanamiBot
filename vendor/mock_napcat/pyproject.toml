[project]
name = "mock-napcat"
version = "0.1.0"
description = "Cross-platform OneBot v11 reverse WebSocket mock backend for KanamiBot."
readme = "README.md"
requires-python = ">=3.12,<3.13"
dependencies = [
    "websockets>=16,<17",
]

[project.scripts]
mock-napcat = "mock_napcat.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
